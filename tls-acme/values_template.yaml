# Default values for spin-acme.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
# Update the placeholders below before installing the chart.
# You can run ./prepare-values.sh to replace the {{placeholders}} in this file.
# The script writes values.yaml for installation.
---
replicaCount: 1

image:
  repository: ghcr.io/dingp/acme
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: latest

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: {{nersc_user_group}} # NERSC GID for the project

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: {{nersc_user_id}} # NERSC UID

service:
  type: ClusterIP
  port: {{service_port}} # (case 1) port of the existing web server, or 8080 if no pre-existing web server (case 2)

ingress:
  name: {{ingress_name}} # name of the ingress, which you already have a DNS CNAME record for.
  enabled: true
  className: nginx
  hosts:
    # you can have multiple user-facing hosts; the chart also adds the default Spin host
    # <ingress_name>.<namespace>.<cluster> as an ingress-only route automatically.
    - host: {{domain}} # DNS CNAME record that users should access directly
      paths:
        - path: /
          pathType: Prefix
  tls:
    # List only the user-facing hosts that should be present in the certificate SANs.
    # The default Spin host is intentionally excluded so it presents a certificate warning.
    - hosts:
        - {{domain}} # same as .ingress.hosts.host

# concatenate only the certificate host list into a ":" separated string
domain: {{domain_list}}

email: {{email}} # email address to be used for the ACME account

cluster: {{cluster}} # NERSC cluster name, development.svc.spin.nersc.org, or production.svc.spin.nersc.org

useCase: {{use_case}} # case1 uses existing web server, case2 creates a new one

webServer:
  webrootPath: '/www'
  # Set by prepare-values.sh based on use_case (case1 or case2).
  existing: {{webserver_existing}} # true for case 1; false for case 2 -- use existing deployment and PVC
  deploymentName: existing-websrv # case 2, use this deployment
  claimName: pvc-existing-webroot # case 2, use this PVC

kubeconfig:
  secretName: kubeconfig

cert:
  secretName: tls-cert

cronJob:
  schedule: '5 12  1 */2 *' # every 2 months

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
