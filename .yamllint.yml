extends: default

rules:
  line-length:
    max: 120
    level: warning
  document-start:
    level: warning
  comments:
    level: warning
    min-spaces-from-content: 1
  comments-indentation: disable
  new-lines:
    level: error
  braces:
    level: warning
  indentation:
    level: error
  truthy:
    level: warning
    check-keys: false

ignore: |
  **/templates/*.yaml
